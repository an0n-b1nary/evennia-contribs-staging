name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit + ruff
        run: pip install pre-commit ruff
      - name: Write anonymity patterns from secret
        env:
          ANONYMITY_PATTERNS: ${{ secrets.ANONYMITY_PATTERNS }}
        run: |
          printf '%s\n' "$ANONYMITY_PATTERNS" > .anonymity-patterns
      - name: Run pre-commit on all files
        run: pre-commit run --all-files
      - name: Python syntax check
        run: |
          files=$(git ls-files '*.py')
          if [ -n "$files" ]; then
            python -m py_compile $files
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Evennia
        run: pip install evennia
      - name: Initialize throwaway game directory
        run: evennia --init ci_game
      - name: Install all contribs and register their apps
        run: python scripts/ci_install_contribs.py ci_game
      - name: Migrate
        working-directory: ci_game
        run: evennia migrate --noinput
      - name: Run tests
        working-directory: ci_game
        run: python ../scripts/ci_run_tests.py
