# Pre-commit hooks for evennia-contribs-staging.
#
# Setup (one-time, per clone):
#   pip install pre-commit
#   pre-commit install
#
# Then `git commit` will automatically run these checks against staged files.
# Run manually against everything with: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: anonymity-guard
        name: anonymity guard (block forbidden upstream-project references)
        entry: python scripts/anonymity_guard.py
        language: system
        types: [text]

      - id: anonymity-identity-guard
        name: anonymity guard (commit identity)
        entry: python scripts/anonymity_identity_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: anonymity-push-guard
        name: anonymity guard (push remote <-> identity)
        entry: python scripts/anonymity_push_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0  # pin to a known-good version; update intentionally
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
